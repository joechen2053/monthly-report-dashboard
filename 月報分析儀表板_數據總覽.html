<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>營運數據智慧分析儀表板 | Monthly Report Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;800&family=Noto+Serif+TC:wght@700;900&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/charts/loader.js"></script>
  <style>
    :root {
      --bg: #f5f1ea;
      --paper: #fffdf9;
      --ink: #2a2a2a;
      --muted: #766c61;
      --line: #d9d0c3;
      --accent: #9a1d2e;
      --accent-dark: #7d1625;
      --accent-soft: #f8ecef;
      --teal: #9a1d2e;
      --gold: #b8812c;
      --shadow: 0 12px 30px rgba(76, 45, 33, 0.08);
      --radius: 18px;
      --hover-row: #f7efe1;
    }

    * { box-sizing: border-box; }

    html, body {
      height: 100%;
    }

    body {
      margin: 0;
      font-family: "Noto Sans TC", sans-serif;
      font-size: 13px;
      color: var(--ink);
      background: linear-gradient(180deg, #fbf8f2 0%, var(--bg) 100%);
      overflow: hidden;
    }

    .shell {
      max-width: 1520px;
      margin: 0 auto;
      height: 100%;
      min-height: 100%;
      padding: 14px 18px 14px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .hero {
      padding: 12px 16px 14px;
      margin-bottom: 8px;
      flex: 0 0 auto;
    }

    .hero-bar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      font-size: clamp(16px, 2.2vw, 26px);
      line-height: 1.05;
      font-weight: 800;
      letter-spacing: 0.02em;
      color: #3f3f3f;
    }

    .title-zh {
      font-family: "Noto Serif TC", "PingFang TC", "Microsoft JhengHei", serif;
    }

    .title-en {
      font-family: Arial, Helvetica, sans-serif;
      font-weight: 600;
    }

    .page-tabs {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 0 0 auto;
      padding-top: 4px;
    }

    .page-tab {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 132px;
      padding: 12px 18px;
      border: 1px solid #ddd6ca;
      background: transparent;
      color: var(--ink);
      text-decoration: none;
      font-size: 15px;
      font-weight: 800;
      line-height: 1;
      transition: background-color 0.2s ease, border-color 0.2s ease;
    }

    .page-tab:hover {
      background: #f5f1ea;
    }

    .page-tab.active {
      background: #e5e5e5;
      border-color: #e5e5e5;
    }

    .report {
      background: var(--paper);
      border: 1px solid #e3d9cc;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      flex: 1 1 auto;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .section-title {
      margin: 0 0 12px;
      font-size: 12px;
      letter-spacing: 0.08em;
      color: var(--muted);
      font-weight: 800;
    }

    .stack {
      display: grid;
      gap: 14px;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px 14px;
      background: #fffdfa;
    }

    .card strong {
      display: block;
      font-size: 15px;
      margin-bottom: 6px;
    }

    .card p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.65;
    }

    label.file {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 15px;
      font-weight: 700;
      color: var(--ink);
      white-space: nowrap;
    }

    select {
      width: 122px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      padding: 8px 36px 8px 10px;
      font-size: 15px;
      line-height: 1.3;
      color: var(--ink);
    }

    .status {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.65;
      white-space: pre-line;
    }

    .report {
      padding: 14px 16px 12px;
    }

    .toolbar {
      display: grid;
      gap: 8px;
      margin-bottom: 10px;
      flex: 0 0 auto;
    }

    .unit-label {
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
    }

    .filter-unit {
      margin-left: auto;
      align-self: center;
      text-align: right;
    }

    .filter-grid {
      display: flex;
      flex-wrap: nowrap;
      gap: 10px 12px;
      align-items: center;
    }

    .filter-item {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 0 0 auto;
    }

    .filter-item.compact select {
      width: 82px;
    }

    .filter-item.wide select {
      width: 126px;
    }

    .filter-item.channel select {
      width: 118px;
    }

    .filter-item.metric select {
      width: 118px;
    }

    .title-filter {
      display: none;
      position: relative;
      flex: 0 0 auto;
    }

    .title-filter.show {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .multi-select {
      position: relative;
    }

    .multi-select-button {
      width: 122px;
      min-width: 122px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      color: var(--ink);
      padding: 8px 32px 8px 10px;
      font: inherit;
      font-size: 15px;
      text-align: left;
      box-shadow: none;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .multi-select-menu {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      min-width: 220px;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      box-shadow: 0 14px 28px rgba(23, 32, 51, 0.14);
      z-index: 20;
    }

    .multi-select.open .multi-select-menu {
      display: block;
    }

    .multi-select-option {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 14px;
      color: var(--ink);
      cursor: pointer;
    }

    .multi-select-option:hover {
      background: #f3f7fc;
    }

    .multi-select-option input {
      margin: 0;
    }

    .warning {
      display: none;
      margin-top: 6px;
      color: #8a5d16;
      line-height: 1.6;
      font-size: 12px;
      flex: 0 0 auto;
    }

    .warning.show {
      display: block;
    }

    .table-wrap {
      flex: 1 1 auto;
      min-height: 0;
      overflow-x: auto;
      overflow-y: auto;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: #fff;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 980px;
    }

    thead th {
      position: sticky;
      top: 0;
      z-index: 2;
      background: var(--accent);
      color: #fffdf8;
      font-size: 16px;
      letter-spacing: 0.04em;
      text-align: right;
      padding: 12px 10px;
      border-bottom: 1px solid #8a1a29;
      box-shadow: 0 1px 0 rgba(76, 45, 33, 0.08);
    }

    thead th:first-child {
      text-align: left;
    }

    tbody td {
      padding: 9px 10px;
      border-bottom: 1px solid #e3d9cc;
      font-size: 16px;
      vertical-align: top;
      text-align: right;
      background: #fffdf9;
    }

    tbody tr:nth-child(even) {
      background: #fcf8f1;
    }

    tbody tr:nth-child(even) td {
      background: #fcf8f1;
    }

    tbody tr:hover td {
      background: var(--hover-row);
    }

    tbody td.metric-name {
      font-weight: 400;
      min-width: 260px;
      text-align: left;
    }

    .metric-tip {
      cursor: help;
    }

    .num {
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .muted {
      color: var(--muted);
    }

    .good { color: #0b7a51; }
    .bad { color: #b0342f; }

    .footnote {
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.8;
      flex: 0 0 auto;
    }

    @media (max-width: 1100px) {
      .filter-grid { gap: 10px 14px; }
    }

    @media (max-width: 640px) {
      body {
        overflow: auto;
      }
      .shell { padding: 14px 10px 30px; }
      .report { border-radius: 20px; }
      .hero-bar {
        align-items: stretch;
      }
      .page-tabs {
        width: 100%;
        justify-content: flex-end;
        flex-wrap: wrap;
        gap: 10px;
        padding-top: 0;
      }
      .page-tab {
        min-width: 0;
        padding: 10px 14px;
      }
      .filter-grid, .filter-item, .title-filter.show {
        display: grid;
        justify-items: stretch;
      }
      .filter-grid {
        flex-wrap: wrap;
      }
      label.file {
        justify-content: space-between;
      }
      select, .multi-select-button {
        width: 100%;
        min-width: 0;
      }
      .table-wrap {
        max-height: none;
      }
      .filter-unit {
        margin-left: 0;
        justify-self: end;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="hero">
      <div class="hero-bar">
        <h1><span class="title-zh">營運數據智慧分析儀表板 | </span><span class="title-en">Monthly Report Dashboard</span></h1>
        <nav class="page-tabs" aria-label="分析頁面切換">
          <a class="page-tab active" href="月報分析儀表板_數據總覽.html" aria-current="page">數據總覽</a>
          <a class="page-tab" href="月報分析儀表板_產品分析.html">產品分析</a>
          <a class="page-tab" href="月報分析儀表板_通路分析.html">通路分析</a>
        </nav>
      </div>
    </section>

    <main class="report">
      <div class="toolbar">
        <div class="status" id="statusText" hidden>尚未載入資料。</div>
        <div class="filter-grid">
          <div class="filter-item compact">
            <label class="file" for="yearSelect">年度</label>
            <select id="yearSelect" disabled></select>
          </div>
          <div class="filter-item compact">
            <label class="file" for="monthSelect">月份</label>
            <select id="monthSelect" disabled></select>
          </div>
          <div class="filter-item wide channel">
            <label class="file" for="channelSelect">通路</label>
            <select id="channelSelect" disabled></select>
          </div>
          <div class="filter-item wide">
            <label class="file" for="productSelect">產品類別</label>
            <select id="productSelect" disabled></select>
          </div>
          <div class="filter-item wide metric">
            <label class="file" for="metricCategorySelect">指標類別</label>
            <select id="metricCategorySelect" disabled></select>
          </div>
          <div class="title-filter" id="titleFilterCard">
            <label class="file" for="titleFilterButton">職級</label>
            <div class="multi-select" id="titleMultiSelect">
              <button type="button" class="multi-select-button" id="titleFilterButton">全部職級</button>
              <div class="multi-select-menu" id="titlePills"></div>
            </div>
          </div>
          <div class="unit-label filter-unit">業績單位：萬元</div>
        </div>
      </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>指標</th>
                <th>今年單月</th>
                <th>去年單月</th>
                <th>單月增減額</th>
                <th>單月增減率</th>
                <th>今年累計</th>
                <th>去年累計</th>
                <th>累計增減額</th>
                <th>累計增減率</th>
              </tr>
            </thead>
            <tbody id="reportBody">
              <tr><td colspan="9" class="muted" style="padding: 24px; text-align: left;">資料載入中。</td></tr>
            </tbody>
          </table>
        </div>

        <div class="warning" id="warningBox"></div>

        <div class="footnote" id="footnote"></div>
    </main>
  </div>

  <script>
    const SALES_SHEET = {
	      spreadsheetId: "15nwY9wvGJeq2iE30QZQCR7RkBNE8b_oUdWT5HIuDBsk",
	      cacheKey: "sales-sheet",
      sheetName: "來源業績",
    };
    const ORG_SHEET = {
	      spreadsheetId: "1_8HFJtMPU1t-yKg5pCaFw8PvCAhhLtCdomkcXYoDbug",
	      cacheKey: "org-sheet",
      sheetName: "工作表1",
    };

    const titleOptions = ["處長", "副處長", "協理", "經理", "主任"];
    const metricCategories = ["產品銷售", "展業效率", "付款方式", "增員育留", "組織結構"];
    const productOptions = ["全部", "契約", "塔位", "墓園"];
    const channelOptions = [
      { value: "全部", label: "全部" },
      { value: "營業處", label: "營業處" },
      { value: "喪葬通路-宇錡", label: "喪葬宇錡" },
      { value: "喪葬通路-龍巖", label: "喪葬龍巖" },
      { value: "多元行銷", label: "多元行銷" },
      { value: "電銷", label: "電銷" },
      { value: "內勤", label: "內勤" },
    ];
	    const googleChartsReady = new Promise((resolve) => {
	      google.charts.load("current", { packages: ["table"] });
	      google.charts.setOnLoadCallback(resolve);
	    });
	    const SHEET_CACHE_DB_NAME = "monthly-report-dashboard-cache";
	    const SHEET_CACHE_STORE_NAME = "sheetRows";
	    let sheetCacheDbPromise = null;

    const state = {
      salesRows: [],
      orgRows: [],
      orgMonthIndex: new Map(),
      orgResolutionCache: new Map(),
      loaded: false,
      selectedTitles: new Set(["經理", "主任"]),
    };

    const $ = (id) => document.getElementById(id);

    function normalizeText(value) {
      return String(value ?? "").trim();
    }

    function parseNumber(value) {
      if (value === null || value === undefined || value === "") return 0;
      const text = String(value).replace(/,/g, "").trim();
      const num = Number(text);
      return Number.isFinite(num) ? num : 0;
    }

    function isTruthyY(value) {
      return normalizeText(value).toUpperCase() === "Y";
    }

    function getSalesGroup(rawCategory) {
      const value = normalizeText(rawCategory);
      if (value === "契約" || value === "契約憑證") return "契約";
      if (value === "塔位" || value === "塔位憑證" || value === "寵物塔位") return "塔位";
      if (value === "墓園") return "墓園";
      return null;
    }

    function getCountGroup(rawCategory) {
      const value = normalizeText(rawCategory);
      if (value === "契約" || value === "塔位" || value === "墓園" || value === "寵物塔位") return value === "寵物塔位" ? "塔位" : value;
      return null;
    }

    function getTitleGroup(title) {
      const value = normalizeText(title);
      if (["協理", "資深協理", "專案協理"].includes(value)) return "協理";
      if (["處長", "副處長", "經理", "主任"].includes(value)) return value;
      return value;
    }

    function isSupervisorTitle(title) {
      return ["處長", "副處長", "資深協理", "協理", "專案協理", "經理", "主任"].includes(normalizeText(title));
    }

    function formatMinguoMonth(year, month) {
      return `${year}${String(month).padStart(2, "0")}`;
    }

    function getPrevYearMonth(yyyymm) {
      const year = Number(String(yyyymm).slice(0, 3));
      const month = String(yyyymm).slice(3).padStart(2, "0");
      return `${year - 1}${month}`;
    }

    function getYtdMonths(yyyymm) {
      const year = Number(String(yyyymm).slice(0, 3));
      const month = Number(String(yyyymm).slice(3));
      return Array.from({ length: month }, (_, idx) => formatMinguoMonth(year, idx + 1));
    }

    function getPeriodLabel(yyyymm) {
      return `${String(yyyymm).slice(0, 3)} 年 ${String(yyyymm).slice(3).padStart(2, "0")} 月`;
    }

    function isOrgRowActive(row) {
      const snapshotMonth = normalizeText(row["年月"]);
      const leaveDate = normalizeText(row["離職年月日"]);
      if (!snapshotMonth) return false;
      if (!leaveDate) return true;
      return leaveDate.slice(0, 5) >= snapshotMonth;
    }

    function buildResolutionForMonth(rows) {
      const byEmployee = new Map();
      const byNode = new Map();

      for (const row of rows) {
        const employeeId = normalizeText(row["業務身份證字號"]);
        const officeName = normalizeText(row["營業處名稱"]);
        const gPosition = normalizeText(row["g_position"]);
        if (!employeeId || !officeName || !gPosition) continue;
        if (!byEmployee.has(employeeId)) byEmployee.set(employeeId, row);
        const nodeKey = `${officeName}__${gPosition}`;
        if (!byNode.has(nodeKey)) byNode.set(nodeKey, []);
        byNode.get(nodeKey).push(row);
      }

      function supervisorPriority(title) {
        return ({
          "主任": 1,
          "經理": 2,
          "專案協理": 3,
          "協理": 4,
          "資深協理": 5,
          "副處長": 6,
          "處長": 7,
        })[normalizeText(title)] ?? 99;
      }

      function chooseSupervisor(candidates) {
        return [...candidates]
          .filter((row) => isSupervisorTitle(row["職稱"]))
          .sort((a, b) => supervisorPriority(a["職稱"]) - supervisorPriority(b["職稱"]))[0] || null;
      }

      const resolved = new Map();
      for (const [employeeId, row] of byEmployee.entries()) {
        const title = normalizeText(row["職稱"]);
        if (title !== "業務代表") {
          resolved.set(employeeId, row);
          continue;
        }
        const officeName = normalizeText(row["營業處名稱"]);
        const gPosition = normalizeText(row["g_position"]);
        let owner = null;
        for (let len = gPosition.length; len >= 2; len -= 2) {
          const ancestor = gPosition.slice(0, len);
          const nodeRows = byNode.get(`${officeName}__${ancestor}`) || [];
          owner = chooseSupervisor(nodeRows.filter((candidate) => normalizeText(candidate["業務身份證字號"]) !== employeeId));
          if (owner) break;
        }
        resolved.set(employeeId, owner || row);
      }

      return { byEmployee, resolved };
    }

    function ensureResolutionCache() {
      if (state.orgResolutionCache.size) return;
      const monthGroups = new Map();
      for (const row of state.orgRows) {
        const month = normalizeText(row["年月"]);
        if (!month) continue;
        if (!monthGroups.has(month)) monthGroups.set(month, []);
        monthGroups.get(month).push(row);
      }
      for (const [month, rows] of monthGroups.entries()) {
        state.orgResolutionCache.set(month, buildResolutionForMonth(rows));
      }
    }

	    function buildSheetQueryUrl({ spreadsheetId, sheetName }) {
	      const url = new URL(`https://docs.google.com/spreadsheets/d/${spreadsheetId}/gviz/tq`);
	      url.searchParams.set("sheet", sheetName);
	      return url.toString();
	    }

	    function getSheetCacheKey({ spreadsheetId, sheetName, cacheKey }) {
	      return cacheKey || `${spreadsheetId}::${sheetName}`;
	    }

	    function openSheetCacheDb() {
	      if (sheetCacheDbPromise) return sheetCacheDbPromise;
	      if (typeof indexedDB === "undefined") {
	        sheetCacheDbPromise = Promise.resolve(null);
	        return sheetCacheDbPromise;
	      }
	      sheetCacheDbPromise = new Promise((resolve) => {
	        const request = indexedDB.open(SHEET_CACHE_DB_NAME, 1);
	        request.onupgradeneeded = () => {
	          const db = request.result;
	          if (!db.objectStoreNames.contains(SHEET_CACHE_STORE_NAME)) {
	            db.createObjectStore(SHEET_CACHE_STORE_NAME, { keyPath: "key" });
	          }
	        };
	        request.onsuccess = () => resolve(request.result);
	        request.onerror = () => {
	          console.warn("[sheet-cache] open failed", request.error?.message || request.error);
	          resolve(null);
	        };
	      });
	      return sheetCacheDbPromise;
	    }

	    async function readSheetRowsCache(sheetConfig) {
	      const db = await openSheetCacheDb();
	      if (!db) return null;
	      const key = getSheetCacheKey(sheetConfig);
	      return new Promise((resolve) => {
	        const transaction = db.transaction(SHEET_CACHE_STORE_NAME, "readonly");
	        const store = transaction.objectStore(SHEET_CACHE_STORE_NAME);
	        const request = store.get(key);
	        request.onsuccess = () => {
	          const rows = Array.isArray(request.result?.rows) ? request.result.rows : null;
	          if (rows) {
	            console.info("[sheet-cache] hit", key, rows.length);
	          } else {
	            console.info("[sheet-cache] miss", key);
	          }
	          resolve(rows);
	        };
	        request.onerror = () => {
	          console.warn("[sheet-cache] read failed", key, request.error?.message || request.error);
	          resolve(null);
	        };
	      });
	    }

	    async function writeSheetRowsCache(sheetConfig, rows) {
	      const db = await openSheetCacheDb();
	      if (!db) return;
	      const key = getSheetCacheKey(sheetConfig);
	      await new Promise((resolve) => {
	        const transaction = db.transaction(SHEET_CACHE_STORE_NAME, "readwrite");
	        const store = transaction.objectStore(SHEET_CACHE_STORE_NAME);
	        const request = store.put({
	          key,
	          cachedAt: Date.now(),
	          rows,
	        });
	        request.onsuccess = () => {
	          console.info("[sheet-cache] stored", key, rows.length);
	          resolve();
	        };
	        request.onerror = () => {
	          console.warn("[sheet-cache] write failed", key, request.error?.message || request.error);
	          resolve();
	        };
	      });
	    }

    function toSpreadsheetColumnLabel(index) {
      let value = index + 1;
      let label = "";
      while (value > 0) {
        const remainder = (value - 1) % 26;
        label = String.fromCharCode(65 + remainder) + label;
        value = Math.floor((value - 1) / 26);
      }
      return label;
    }

    function dataTableToObjects(dataTable) {
      const initialHeaders = Array.from({ length: dataTable.getNumberOfColumns() }, (_, colIndex) => {
        return normalizeText(dataTable.getColumnLabel(colIndex)) || normalizeText(dataTable.getColumnId(colIndex)) || `COL_${colIndex + 1}`;
      });
      const shouldUseFirstRowAsHeader = initialHeaders.every((header, colIndex) => {
        const generic = header === toSpreadsheetColumnLabel(colIndex) || header === `COL_${colIndex + 1}`;
        return generic;
      }) && dataTable.getNumberOfRows() > 0;

      const headers = shouldUseFirstRowAsHeader
        ? Array.from({ length: dataTable.getNumberOfColumns() }, (_, colIndex) => {
            return normalizeText(dataTable.getFormattedValue(0, colIndex)) || `COL_${colIndex + 1}`;
          })
        : initialHeaders;
      const startRowIndex = shouldUseFirstRowAsHeader ? 1 : 0;

      return Array.from({ length: Math.max(0, dataTable.getNumberOfRows() - startRowIndex) }, (_, offset) => {
        const rowIndex = offset + startRowIndex;
        const row = {};
        headers.forEach((header, colIndex) => {
          const formatted = dataTable.getFormattedValue(rowIndex, colIndex);
          const raw = dataTable.getValue(rowIndex, colIndex);
          row[header] = formatted ?? raw ?? "";
        });
        return row;
      });
    }

	    async function fetchSheetRows(sheetConfig) {
		      const cachedRows = await readSheetRowsCache(sheetConfig);
	      if (cachedRows) return cachedRows;
	      await googleChartsReady;
      return new Promise((resolve, reject) => {
        const query = new google.visualization.Query(buildSheetQueryUrl(sheetConfig));
	        query.send(async (response) => {
          if (response.isError()) {
            reject(new Error(response.getMessage() || "Google Sheets 讀取失敗"));
            return;
          }
	          const rows = dataTableToObjects(response.getDataTable());
		          await writeSheetRowsCache(sheetConfig, rows);
	          resolve(rows);
        });
      });
    }

    function setStatus(text) {
      $("statusText").textContent = text;
    }

    function getCurrentMinguoYear() {
      return String(new Date().getFullYear() - 1911);
    }

    function getAvailableYears() {
      return [...new Set(state.salesRows.map((row) => normalizeText(row["年"])).filter(Boolean))].sort();
    }

    function getLatestOrgPeriod() {
      return [...new Set(state.orgRows.map((row) => normalizeText(row["年月"])).filter(Boolean))].sort().at(-1) || "";
    }

    function getLatestMonthForYear(year) {
      const months = [...new Set(
        state.salesRows
          .filter((row) => normalizeText(row["年"]) === year)
          .map((row) => String(parseNumber(row["月"])).padStart(2, "0"))
          .filter((month) => month !== "00")
      )].sort();
      return months.at(-1) || "12";
    }

    function getLatestOrgMonthForYear(year) {
      const months = [...new Set(
        state.orgRows
          .filter((row) => normalizeText(row["年月"]).startsWith(year))
          .map((row) => normalizeText(row["年月"]).slice(3, 5))
          .filter(Boolean)
      )].sort();
      return months.at(-1) || getLatestMonthForYear(year);
    }

    function getAvailableMonthsForYear(year) {
      return Array.from({ length: 12 }, (_, idx) => String(idx + 1).padStart(2, "0"));
    }

    function updateMonthOptions(selectedYear, preferredMonth = null) {
      const months = getAvailableMonthsForYear(selectedYear);
      const fallbackMonth = selectedYear === "全部"
        ? getLatestOrgMonthForYear(getAvailableYears().at(-1))
        : getLatestOrgMonthForYear(selectedYear);
      const selectedMonth = preferredMonth && months.includes(preferredMonth)
        ? preferredMonth
        : fallbackMonth;
      fillSelect($("monthSelect"), months, selectedMonth);
    }

    function buildFilterOptions() {
      const years = getAvailableYears();
      const availableChannels = new Set(state.salesRows.map((row) => normalizeText(row["通路類別"])).filter(Boolean));
      const channels = channelOptions.filter((channel) => channel.value === "全部" || availableChannels.has(channel.value));
      const defaultYear = years.includes(getCurrentMinguoYear()) ? getCurrentMinguoYear() : years.at(-1);
      const latestOrgPeriod = getLatestOrgPeriod();
      const defaultMonth = latestOrgPeriod ? latestOrgPeriod.slice(3, 5) : getLatestOrgMonthForYear(defaultYear);
      const defaultChannel = channels.some((channel) => channel.value === "營業處") ? "營業處" : channels[0]?.value;

      fillSelect($("yearSelect"), ["全部", ...years], defaultYear);
      updateMonthOptions(defaultYear, defaultMonth);
      fillSelect($("channelSelect"), channels, defaultChannel);
      fillSelect($("productSelect"), productOptions, "全部");
      fillSelect($("metricCategorySelect"), metricCategories, "產品銷售");

      ["yearSelect", "monthSelect", "channelSelect", "productSelect", "metricCategorySelect"].forEach((id) => {
        $(id).disabled = false;
      });
      renderTitleDropdown();
      toggleTitleCard();
    }

    function fillSelect(el, values, selectedValue) {
      el.innerHTML = values.map((value) => {
        if (typeof value === "object") {
          return `<option value="${value.value}">${value.label}</option>`;
        }
        return `<option value="${value}">${value}</option>`;
      }).join("");
      const normalizedValues = values.map((value) => typeof value === "object" ? value.value : value);
      if (selectedValue && normalizedValues.includes(selectedValue)) {
        el.value = selectedValue;
      }
    }

    function isAllTitlesSelected() {
      return state.selectedTitles.size === titleOptions.length;
    }

    function getTitleSummary() {
      if (isAllTitlesSelected()) return "全部職級";
      return [...state.selectedTitles].join("、");
    }

    function renderTitleDropdown() {
      $("titleFilterButton").textContent = getTitleSummary();
      $("titlePills").innerHTML = titleOptions.map((title) => {
        const checked = state.selectedTitles.has(title) ? "checked" : "";
        return `
          <label class="multi-select-option">
            <input type="checkbox" data-title="${title}" ${checked}>
            <span>${title}</span>
          </label>
        `;
      }).join("");
      $("titlePills").querySelectorAll("input[type='checkbox']").forEach((checkbox) => {
        checkbox.addEventListener("change", () => {
          const title = checkbox.dataset.title;
          if (checkbox.checked) {
            state.selectedTitles.add(title);
          } else {
            if (state.selectedTitles.size === 1) {
              checkbox.checked = true;
              return;
            }
            state.selectedTitles.delete(title);
          }
          $("titleFilterButton").textContent = getTitleSummary();
          renderReport();
        });
      });
    }

    function toggleTitleCard() {
      $("titleFilterCard").classList.toggle("show", $("metricCategorySelect").value === "組織結構");
      if ($("metricCategorySelect").value !== "組織結構") {
        $("titleMultiSelect").classList.remove("open");
      }
    }

    function getSelectedContext() {
      const selectedYear = $("yearSelect").value;
      const selectedMonth = $("monthSelect").value;
      const availableYears = getAvailableYears();
      const year = selectedYear === "全部" ? availableYears.at(-1) : selectedYear;
      const prevYear = String(Number(year) - 1).padStart(3, "0");
      const month = selectedMonth || getLatestMonthForYear(year);
      const currentPeriods = [formatMinguoMonth(year, Number(month))];
      const prevPeriods = [formatMinguoMonth(prevYear, Number(month))];
      const yyyymm = currentPeriods.at(-1) || `${year}${month}`;
      return {
        selectedYear,
        selectedMonth,
        year,
        month,
        yyyymm,
        prevYyyymm: prevPeriods.at(-1) || getPrevYearMonth(yyyymm),
        currentPeriods,
        prevPeriods,
        ytdMonths: getYtdMonths(yyyymm),
        prevYtdMonths: getYtdMonths(getPrevYearMonth(yyyymm)),
        channel: $("channelSelect").value,
        product: $("productSelect").value,
        metricCategory: $("metricCategorySelect").value,
        titles: [...state.selectedTitles],
      };
    }

    function filterSalesRowsByPeriod(yyyymm, channel) {
      return state.salesRows.filter((row) => {
        if (normalizeText(row["業績確認年月"]) !== yyyymm) return false;
        if (!isTruthyY(row["業績認列"])) return false;
        if (normalizeText(row["營業處名稱"]) === "業務開發處") return false;
        if (channel !== "全部" && normalizeText(row["通路類別"]) !== channel) return false;
        return true;
      });
    }

    function filterSalesRowsByProduct(rows, product, forCount = false) {
      return rows.filter((row) => {
        const group = forCount ? getCountGroup(row["產品類別"]) : getSalesGroup(row["產品類別"]);
        if (!group) return false;
        if (product === "全部") return true;
        return group === product;
      });
    }

    function getRevenue(rows, product) {
      return filterSalesRowsByProduct(rows, product, false).reduce((sum, row) => sum + parseNumber(row["管報金額"]), 0);
    }

    function getDealCountEligibleRows(rows, product) {
      return filterSalesRowsByProduct(rows, product, true).filter((row) => parseNumber(row["數量"]) === 1);
    }

    function getDealCount(rows, product) {
      return getDealCountEligibleRows(rows, product).reduce((sum, row) => sum + parseNumber(row["數量"]), 0);
    }

    function getCustomerCount(rows, product) {
      const set = new Set();
      for (const row of filterSalesRowsByProduct(rows, product, false)) {
        const customerId = normalizeText(row["客戶身份證字號"]);
        if (customerId) set.add(customerId);
      }
      return set.size;
    }

    function getBigOrderRows(rows, product, forCount = false) {
      return filterSalesRowsByProduct(rows, product, forCount).filter((row) => parseNumber(row["管報金額"]) >= 100);
    }

    function getPaymentRows(rows, product, kind) {
      return filterSalesRowsByProduct(rows, product, false).filter((row) => {
        const payment = normalizeText(row["付款方式類別"]);
        const isInstallment = payment.includes("分期");
        if (kind === "installment") return isInstallment;
        if (kind === "cash") return !isInstallment;
        return false;
      });
    }

    function getHireCount(period, statuses) {
      return state.orgRows.filter((row) => (
        normalizeText(row["年月"]) === period
        && statuses.includes(normalizeText(row["報聘狀況"]))
      )).length;
    }

    function getSelfPurchaseRows(rows, product) {
      return filterSalesRowsByProduct(rows, product, false).filter((row) => isTruthyY(row["是否自購"]));
    }

    function getResolvedOwner(row) {
      const month = normalizeText(row["業績確認年月"]);
      const employeeId = normalizeText(row["業務身份證字號"]);
      const cache = state.orgResolutionCache.get(month);
      return cache?.resolved.get(employeeId) || null;
    }

    function getActiveOrgRows(yyyymm) {
      return state.orgRows.filter((row) => normalizeText(row["年月"]) === yyyymm && isSupervisorTitle(row["職稱"]) && isOrgRowActive(row));
    }

    function shouldExcludeChiefFromTitleMetrics(row, groupedTitle) {
      return groupedTitle === "處長" && normalizeText(row["營業處名稱"]) === "行政處6D";
    }

    function getActiveHeadcount(yyyymm, titles = null) {
      const rows = getActiveOrgRows(yyyymm).filter((row) => {
        const groupedTitle = getTitleGroup(row["職稱"]);
        if (titles && !titles.includes(groupedTitle)) return false;
        if (titles && shouldExcludeChiefFromTitleMetrics(row, groupedTitle)) return false;
        return true;
      });
      return new Set(rows.map((row) => normalizeText(row["業務身份證字號"]))).size;
    }

    function getProductiveHeadcount(rows, product, titles = null) {
      const ids = new Set();
      for (const row of filterSalesRowsByProduct(rows, product, false)) {
        const owner = getResolvedOwner(row);
        if (!owner) continue;
        const groupedTitle = getTitleGroup(owner["職稱"]);
        if (titles && !titles.includes(groupedTitle)) continue;
        if (!isSupervisorTitle(owner["職稱"])) continue;
        ids.add(normalizeText(owner["業務身份證字號"]));
      }
      return ids.size;
    }

    function getRevenueByTitles(rows, product, titles) {
      return filterSalesRowsByProduct(rows, product, false).reduce((sum, row) => {
        const owner = getResolvedOwner(row);
        if (!owner) return sum;
        const groupedTitle = getTitleGroup(owner["職稱"]);
        if (!titles.includes(groupedTitle)) return sum;
        if (shouldExcludeChiefFromTitleMetrics(owner, groupedTitle)) return sum;
        return sum + parseNumber(row["管報金額"]);
      }, 0);
    }

    function getOfficeRevenueRank(rows, product, topN) {
      const officeMap = new Map();
      for (const row of filterSalesRowsByProduct(rows, product, false)) {
        if (normalizeText(row["通路類別"]) !== "營業處") continue;
        const officeName = normalizeText(row["營業處名稱"]);
        officeMap.set(officeName, (officeMap.get(officeName) || 0) + parseNumber(row["管報金額"]));
      }
      return [...officeMap.values()].sort((a, b) => b - a).slice(0, topN).reduce((sum, value) => sum + value, 0);
    }

    function subtractMonths(yyyymm, months) {
      const year = Number(String(yyyymm).slice(0, 3)) + 1911;
      const month = Number(String(yyyymm).slice(3));
      const date = new Date(year, month - 1 - months, 1);
      return `${String(date.getFullYear() - 1911).padStart(3, "0")}${String(date.getMonth() + 1).padStart(2, "0")}`;
    }

    function getRetentionStats(yyyymm, hireType, months) {
      const cohortMonth = subtractMonths(yyyymm, months);
      const cohort = state.orgRows.filter((row) => normalizeText(row["年月"]) === cohortMonth && normalizeText(row["報聘狀況"]) === hireType);
      if (!cohort.length) return null;
      const currentMonthMap = new Map(
        state.orgRows
          .filter((row) => normalizeText(row["年月"]) === yyyymm)
          .map((row) => [normalizeText(row["業務身份證字號"]), row])
      );
      let retained = 0;
      for (const row of cohort) {
        const current = currentMonthMap.get(normalizeText(row["業務身份證字號"]));
        if (current && isOrgRowActive(current)) retained += 1;
      }
      return { retained, total: cohort.length };
    }

    function getRetentionRate(yyyymm, hireType, months) {
      const stats = getRetentionStats(yyyymm, hireType, months);
      if (!stats) return null;
      return stats.retained / stats.total;
    }

    function getWeightedRetentionRate(periods, months) {
      let retainedTotal = 0;
      let cohortTotal = 0;
      for (const period of periods) {
        for (const hireType of ["新進", "重新報聘"]) {
          const stats = getRetentionStats(period, hireType, months);
          if (!stats) continue;
          retainedTotal += stats.retained;
          cohortTotal += stats.total;
        }
      }
      return safeDivide(retainedTotal, cohortTotal);
    }

    function safeDivide(numerator, denominator) {
      if (!denominator) return null;
      return numerator / denominator;
    }

    function averageMonthlyValue(periods, context, valueGetter) {
      if (!periods.length) return null;
      const values = periods
        .map((period) => valueGetter(filterSalesRowsByPeriod(period, context.channel), period))
        .filter((value) => value !== null && value !== undefined && !Number.isNaN(value));
      if (!values.length) return null;
      return values.reduce((sum, value) => sum + value, 0) / values.length;
    }

          {
            key: "newHireCount",
            label: "新進報聘人數",
            note: "當月報聘狀況 = 新進。",
            type: "integer",
            value: (_, period) => getHireCount(period, ["新進"]),
            ytdValue: (_, periods) => periods.reduce((sum, period) => sum + getHireCount(period, ["新進"]), 0),
          },
          {
            key: "rehireCount",
            label: "重新報聘人數",
            note: "當月報聘狀況 = 重新報聘。",
            type: "integer",
            value: (_, period) => getHireCount(period, ["重新報聘"]),
            ytdValue: (_, periods) => periods.reduce((sum, period) => sum + getHireCount(period, ["重新報聘"]), 0),
          },
          {
            key: "totalHireCount",
            label: "合計報聘人數",
            note: "新進 + 重新報聘。",
            type: "integer",
            value: (_, period) => getHireCount(period, ["新進", "重新報聘"]),
            ytdValue: (_, periods) => periods.reduce((sum, period) => sum + getHireCount(period, ["新進", "重新報聘"]), 0),
          },
          {
            key: "retention6",
            label: "6個月續留率",
            note: "以 6 個月前報聘 cohort 計算。",
            type: "percent",
            value: (_, period) => getWeightedRetentionRate([period], 6),
            ytdValue: (_, periods) => getWeightedRetentionRate(periods, 6),
          },
          {
            key: "retention12",
            label: "12個月續留率",
            note: "以 12 個月前報聘 cohort 計算。",
            type: "percent",
            value: (_, period) => getWeightedRetentionRate([period], 12),
            ytdValue: (_, periods) => getWeightedRetentionRate(periods, 12),
          },
        ],
        "組織結構": [
          {
            key: "revenue",
            label: "{product}業績",
            note: "依產品類別統計有效業績總額。",
            type: "currency",
            hidden: () => isAllTitlesSelected() && context.product !== "全部",
            value: (rows) => getRevenue(rows, context.product),
          },
          {
            key: "activeHeadcount",
            label: "在職人數",
            note: "主任級(含)以上在職人數。",
            type: "integer",
            value: (_, period) => getActiveHeadcount(period),
            ytdValue: (_, periods) => averageMonthlyValue(periods, context, (_rows, period) => getActiveHeadcount(period)),
          },
          {
            key: "titleHeadcount",
            label: "{titles}人數",
            note: "依目前職級複選結果統計。",
            type: "integer",
            hidden: () => isAllTitlesSelected(),
            value: (_, period) => getActiveHeadcount(period, context.titles),
            ytdValue: (_, periods) => averageMonthlyValue(periods, context, (_rows, period) => getActiveHeadcount(period, context.titles)),
          },
          {
            key: "titleHeadcountRatio",
            label: "{titles}人數佔率",
            note: "依目前職級複選結果統計。",
            type: "percent",
            hidden: () => isAllTitlesSelected(),
            value: (_, period) => safeDivide(getActiveHeadcount(period, context.titles), getActiveHeadcount(period)),
            ytdValue: (_, periods) => averageMonthlyValue(periods, context, (_rows, period) => safeDivide(getActiveHeadcount(period, context.titles), getActiveHeadcount(period))),
          },
          {
            key: "titleRevenue",
            label: "{titles}業績",
            note: "依目前職級複選結果統計。",
            type: "currency",
            hidden: () => isAllTitlesSelected(),
            value: (rows) => getRevenueByTitles(rows, context.product, context.titles),
          },
          {
            key: "titleRevenueRatio",
            label: "{titles}業績佔率",
            note: "分母採同類母體。",
            type: "percent",
            hidden: () => isAllTitlesSelected(),
            value: (rows) => safeDivide(getRevenueByTitles(rows, context.product, context.titles), getRevenue(rows, context.product)),
          },
          {
            key: "top1Revenue",
            label: "營Top1業績",
            note: "通路 = 營業處時適用。",
            type: "currency",
            hidden: () => context.channel !== "營業處",
            value: (rows) => getOfficeRevenueRank(rows, context.product, 1),
          },
          {
            key: "top1Ratio",
            label: "營Top1業績佔率",
            note: "通路 = 營業處時適用。",
            type: "percent",
            hidden: () => context.channel !== "營業處",
            value: (rows) => safeDivide(getOfficeRevenueRank(rows, context.product, 1), getRevenue(rows, context.product)),
          },
          {
            key: "top5Revenue",
            label: "營Top5業績",
            note: "通路 = 營業處時適用。",
            type: "currency",
            hidden: () => context.channel !== "營業處",
            value: (rows) => getOfficeRevenueRank(rows, context.product, 5),
          },
          {
            key: "top5Ratio",
            label: "營Top5業績佔率",
            note: "通路 = 營業處時適用。",
            type: "percent",
            hidden: () => context.channel !== "營業處",
            value: (rows) => safeDivide(getOfficeRevenueRank(rows, context.product, 5), getRevenue(rows, context.product)),
          },
          {
            key: "top10Revenue",
            label: "營Top10業績",
            note: "通路 = 營業處時適用。",
            type: "currency",
            hidden: () => context.channel !== "營業處",
            value: (rows) => getOfficeRevenueRank(rows, context.product, 10),
          },
          {
            key: "top10Ratio",
            label: "營Top10業績佔率",
            note: "通路 = 營業處時適用。",
            type: "percent",
            hidden: () => context.channel !== "營業處",
            value: (rows) => safeDivide(getOfficeRevenueRank(rows, context.product, 10), getRevenue(rows, context.product)),
          },
        ],
      };
    }

    function formatValue(value, type) {
      if (value === null || value === undefined || Number.isNaN(value)) return "—";
      if (type === "percent") return `${(value * 100).toFixed(1)}%`;
      if (type === "integer") return `${Math.round(value).toLocaleString("zh-TW")}`;
      if (type === "decimal") return `${value.toFixed(1)}`;
      return `${Math.round(value).toLocaleString("zh-TW")}`;
    }

    function formatDelta(value, type) {
      if (value === null || value === undefined || Number.isNaN(value)) return "—";
      const formatted = formatValue(Math.abs(value), type);
      const cls = value > 0 ? "good" : value < 0 ? "bad" : "";
      const sign = value > 0 ? "+" : value < 0 ? "-" : "";
      return `<span class="num ${cls}">${sign}${formatted}</span>`;
    }

    function computePeriodMetrics(yyyymm, context) {
      const rows = filterSalesRowsByPeriod(yyyymm, context.channel);
      return { yyyymm, rows };
    }

    function computeRowsForPeriods(periods, context) {
      return periods.flatMap((period) => filterSalesRowsByPeriod(period, context.channel));
    }

    function getUnresolvedOwnerCount(rows) {
      return rows.filter((row) => !getResolvedOwner(row)).length;
    }

    function computeYtdRows(months, context) {
      return months.flatMap((month) => filterSalesRowsByPeriod(month, context.channel));
    }

    function renderWarnings(context) {
      const warnings = [];
      if (["展業效率", "增員育留", "組織結構"].includes(context.metricCategory) && context.channel !== "營業處") {
        warnings.push("目前選到的人員/組織型指標，會使用業務組織檔計算。若通路不是「營業處」，部分指標可能只對營業處體系有完整覆蓋。");
      }
      if (["展業效率", "組織結構"].includes(context.metricCategory) && context.channel === "營業處") {
        const unresolvedOwnerCount = getUnresolvedOwnerCount(computeRowsForPeriods(context.currentPeriods, context));
        if (unresolvedOwnerCount > 0) {
          warnings.push(`目前條件下仍有 ${unresolvedOwnerCount} 筆業績找不到當月組織歸屬，涉及實動人數、產值、職級業績等組織型指標時，結果可能略有低估。`);
        }
      }
      if (context.metricCategory === "組織結構" && context.titles.length === 0) {
        warnings.push("組織結構類至少要保留一個職級。");
      }
      const box = $("warningBox");
      if (warnings.length) {
        box.classList.add("show");
        box.innerHTML = warnings.map((warning) => `※ ${warning}`).join("<br>");
      } else {
        box.classList.remove("show");
        box.textContent = "";
      }
    }

    function renderReport() {
      if (!state.loaded) return;
      const context = getSelectedContext();
      toggleTitleCard();
      renderWarnings(context);

      const registry = buildMetricRegistry(context)[context.metricCategory];
      const current = { yyyymm: context.yyyymm, rows: computeRowsForPeriods(context.currentPeriods, context) };
      const prev = { yyyymm: context.prevYyyymm, rows: computeRowsForPeriods(context.prevPeriods, context) };
      const currentYtdRows = computeYtdRows(context.ytdMonths, context);
      const prevYtdRows = computeYtdRows(context.prevYtdMonths, context);

      const rowsHtml = registry
        .filter((metric) => !(metric.hidden && metric.hidden()))
        .map((metric) => {
          const currentValue = metric.value(current.rows, context.yyyymm);
          const prevValue = metric.value(prev.rows, context.prevYyyymm);
          const currentYtdValue = metric.ytdValue
            ? metric.ytdValue(currentYtdRows, context.ytdMonths)
            : metric.value(currentYtdRows, context.yyyymm);
          const prevYtdValue = metric.ytdValue
            ? metric.ytdValue(prevYtdRows, context.prevYtdMonths)
            : metric.value(prevYtdRows, context.prevYyyymm);
          const label = metricLabel(metric.label, context);

          const monthDelta = currentValue === null || prevValue === null ? null : currentValue - prevValue;
          const monthDeltaRate = currentValue === null || prevValue === null ? null : safeDivide(currentValue - prevValue, prevValue);
          const ytdDelta = currentYtdValue === null || prevYtdValue === null ? null : currentYtdValue - prevYtdValue;
          const ytdDeltaRate = currentYtdValue === null || prevYtdValue === null ? null : safeDivide(currentYtdValue - prevYtdValue, prevYtdValue);

          return `
            <tr>
              <td class="metric-name"><span class="metric-tip" title="${metric.note}">${label}</span></td>
              <td class="num">${formatValue(currentValue, metric.type)}</td>
              <td class="num">${formatValue(prevValue, metric.type)}</td>
              <td>${formatDelta(monthDelta, metric.type)}</td>
              <td>${formatDelta(monthDeltaRate, "percent")}</td>
              <td class="num">${formatValue(currentYtdValue, metric.type)}</td>
              <td class="num">${formatValue(prevYtdValue, metric.type)}</td>
              <td>${formatDelta(ytdDelta, metric.type)}</td>
              <td>${formatDelta(ytdDeltaRate, "percent")}</td>
            </tr>
          `;
        })
        .join("");

      $("reportBody").innerHTML = rowsHtml || `<tr><td colspan="9" class="muted" style="padding:24px; text-align:left;">目前條件下沒有可顯示的指標。</td></tr>`;
      $("footnote").innerHTML = "";
    }

    async function useSheetRows(salesRows, orgRows) {
      state.salesRows = salesRows;
      state.orgRows = orgRows;
      state.orgResolutionCache.clear();
      ensureResolutionCache();
      state.loaded = true;
      buildFilterOptions();
      setStatus([
        "已載入資料。",
        `業績列數：${state.salesRows.length.toLocaleString("zh-TW")}`,
        `組織列數：${state.orgRows.length.toLocaleString("zh-TW")}`,
      ].join("\n"));
      renderReport();
    }

    async function handleAutoLoad() {
      setStatus("正在讀取 Google Sheets...");
      try {
        const [salesRows, orgRows] = await Promise.all([
          fetchSheetRows(SALES_SHEET),
          fetchSheetRows(ORG_SHEET),
        ]);
        await useSheetRows(salesRows, orgRows);
      } catch (error) {
        setStatus(`Google Sheets 讀取失敗：${error.message}`);
        $("reportBody").innerHTML = `<tr><td colspan="9" class="muted" style="padding:24px; text-align:left;">無法讀取 Google Sheets。請先將兩份試算表設為可公開讀取，建議至少設為「知道連結的任何人可檢視」，若仍失敗再使用「發布到網路」。</td></tr>`;
      }
    }

    $("yearSelect").addEventListener("change", () => {
      updateMonthOptions($("yearSelect").value, $("monthSelect").value);
      renderReport();
    });
    $("titleFilterButton").addEventListener("click", (event) => {
      event.stopPropagation();
      $("titleMultiSelect").classList.toggle("open");
    });
    $("titlePills").addEventListener("click", (event) => {
      event.stopPropagation();
    });
    document.addEventListener("click", (event) => {
      if (!$("titleMultiSelect").contains(event.target)) {
        $("titleMultiSelect").classList.remove("open");
      }
    });
    ["monthSelect", "channelSelect", "productSelect", "metricCategorySelect"].forEach((id) => {
      $(id).addEventListener("change", renderReport);
      $(id).addEventListener("change", toggleTitleCard);
    });
    handleAutoLoad();
  </script>
</body>
</html>
