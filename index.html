<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>月報分析儀表板</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;800&family=Noto+Serif+TC:wght@700;900&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/charts/loader.js"></script>
  <style>
    :root {
      --bg: #f4efe6;
      --paper: #fffdf8;
      --ink: #1f2430;
      --muted: #6a7384;
      --line: #ddd2bf;
      --accent: #9f4f2f;
      --accent-dark: #6f2f17;
      --accent-soft: #f6dfd3;
      --teal: #0d6c74;
      --gold: #b5852f;
      --shadow: 0 24px 48px rgba(63, 42, 22, 0.08);
      --radius: 22px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Noto Sans TC", sans-serif;
      font-size: 13px;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(159, 79, 47, 0.12), transparent 30%),
        radial-gradient(circle at top right, rgba(13, 108, 116, 0.08), transparent 24%),
        linear-gradient(180deg, #efe6d7 0%, var(--bg) 100%);
    }

    .shell {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px 16px 40px;
    }

    .hero {
      background:
        linear-gradient(135deg, rgba(159, 79, 47, 0.14), rgba(159, 79, 47, 0.03)),
        linear-gradient(180deg, #fffdf9, #fbf4e8);
      border: 1px solid rgba(221, 210, 191, 0.9);
      border-radius: 30px;
      box-shadow: var(--shadow);
      padding: 20px 24px;
      margin-bottom: 14px;
      overflow: hidden;
      position: relative;
    }

    .hero::after {
      content: "";
      position: absolute;
      right: -80px;
      top: -60px;
      width: 260px;
      height: 260px;
      background: radial-gradient(circle, rgba(181, 133, 47, 0.15), transparent 65%);
      pointer-events: none;
    }

    h1 {
      margin: 0;
      font-family: "Noto Serif TC", serif;
      font-size: clamp(18px, 3vw, 28px);
      line-height: 1.1;
    }

    .report {
      background: var(--paper);
      border: 1px solid rgba(221, 210, 191, 0.88);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .section-title {
      margin: 0 0 12px;
      font-size: 12px;
      letter-spacing: 0.08em;
      color: var(--muted);
      font-weight: 800;
    }

    .stack {
      display: grid;
      gap: 14px;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px;
      background: #fffdf9;
    }

    .card strong {
      display: block;
      font-size: 15px;
      margin-bottom: 6px;
    }

    .card p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.65;
    }

    label.file {
      display: block;
      font-size: 14px;
      font-weight: 700;
      color: var(--ink);
    }

    select {
      width: 100%;
      margin-top: 8px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      padding: 9px 11px;
      font: inherit;
      font-size: 15px;
      color: var(--ink);
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .grid-1 {
      display: grid;
      gap: 12px;
    }

    .pill-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .pill {
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #fbf7ef;
      cursor: pointer;
      user-select: none;
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
    }

    .pill.active {
      background: var(--teal);
      color: #fff;
      border-color: var(--teal);
    }

    .status {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.65;
      white-space: pre-line;
    }

    .report {
      padding: 16px;
    }

    .toolbar {
      display: grid;
      gap: 12px;
      margin-bottom: 12px;
    }

    .toolbar-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .unit-label {
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }

    .filter-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 12px;
    }

    .title-filter {
      display: none;
      padding: 12px 14px;
    }

    .title-filter.show {
      display: block;
    }

    .warning {
      display: none;
      margin-top: 14px;
      border-left: 4px solid var(--gold);
      background: #fff8e8;
      color: #6a5120;
      border-radius: 14px;
      padding: 12px 14px;
      line-height: 1.7;
      font-size: 12px;
    }

    .warning.show {
      display: block;
    }

    .table-wrap {
      overflow: auto;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: #fff;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 980px;
    }

    thead th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: #fbf5ea;
      color: var(--accent-dark);
      font-size: 14px;
      letter-spacing: 0.04em;
      text-align: right;
      padding: 12px 10px;
      border-bottom: 1px solid var(--line);
    }

    thead th:first-child {
      text-align: left;
    }

    tbody td {
      padding: 11px 10px;
      border-bottom: 1px solid #eee6d9;
      font-size: 14px;
      vertical-align: top;
      text-align: right;
    }

    tbody tr:nth-child(even) {
      background: #fffdf9;
    }

    tbody td.metric-name {
      font-weight: 700;
      min-width: 260px;
      text-align: left;
    }

    .metric-tip {
      text-decoration: underline dotted rgba(31, 36, 48, 0.35);
      text-underline-offset: 3px;
      cursor: help;
    }

    .num {
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .muted {
      color: var(--muted);
    }

    .good { color: #0b7a51; }
    .bad { color: #b0342f; }

    .footnote {
      margin-top: 14px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.8;
    }

    @media (max-width: 1100px) {
      .filter-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    }

    @media (max-width: 640px) {
      .shell { padding: 14px 10px 30px; }
      .hero, .report { border-radius: 20px; }
      .filter-grid, .grid-2 { grid-template-columns: 1fr; }
      .toolbar-top { align-items: flex-start; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="hero">
      <h1>月報分析儀表板</h1>
    </section>

    <main class="report">
      <div class="toolbar">
        <div class="toolbar-top">
          <div class="unit-label">業績單位：萬元</div>
          <div class="status" id="statusText" hidden>尚未載入資料。</div>
        </div>
        <div class="filter-grid">
          <label class="file">
            年度
            <select id="yearSelect" disabled></select>
          </label>
          <label class="file">
            月份
            <select id="monthSelect" disabled></select>
          </label>
          <label class="file">
            通路
            <select id="channelSelect" disabled></select>
          </label>
          <label class="file">
            產品類別
            <select id="productSelect" disabled></select>
          </label>
          <label class="file">
            指標類別
            <select id="metricCategorySelect" disabled></select>
          </label>
        </div>
        <div class="card title-filter" id="titleFilterCard">
          <strong>職級（可複選）</strong>
          <div class="pill-wrap" id="titlePills"></div>
        </div>
      </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>指標</th>
                <th>今年單月</th>
                <th>去年單月</th>
                <th>單月增減額</th>
                <th>單月增減率</th>
                <th>今年累計</th>
                <th>去年累計</th>
                <th>累計增減額</th>
                <th>累計增減率</th>
              </tr>
            </thead>
            <tbody id="reportBody">
              <tr><td colspan="9" class="muted" style="padding: 24px; text-align: left;">資料載入中。</td></tr>
            </tbody>
          </table>
        </div>

        <div class="warning" id="warningBox"></div>

        <div class="footnote" id="footnote">
          指標命名與規則依目前文件版本實作。展業效率、增員育留、組織結構等人員相關指標會用 <code>業務組織</code> 試算表與 <code>g_position</code> 組織關係計算。
        </div>
    </main>
  </div>

  <script>
    const SALES_SHEET = {
      spreadsheetId: "15nwY9wvGJeq2iE30QZQCR7RkBNE8b_oUdWT5HIuDBsk",
      sheetName: "來源業績",
    };
    const ORG_SHEET = {
      spreadsheetId: "1_8HFJtMPU1t-yKg5pCaFw8PvCAhhLtCdomkcXYoDbug",
      sheetName: "工作表1",
    };

    const titleOptions = ["處長", "副處長", "協理", "經理", "主任"];
    const metricCategories = ["產品銷售", "展業效率", "付款方式", "增員育留", "組織結構"];
    const productOptions = ["全部", "契約", "塔位", "墓園"];
    const googleChartsReady = new Promise((resolve) => {
      google.charts.load("current", { packages: ["table"] });
      google.charts.setOnLoadCallback(resolve);
    });

    const state = {
      salesRows: [],
      orgRows: [],
      orgMonthIndex: new Map(),
      orgResolutionCache: new Map(),
      loaded: false,
      selectedTitles: new Set(titleOptions),
    };

    const $ = (id) => document.getElementById(id);

    function normalizeText(value) {
      return String(value ?? "").trim();
    }

    function parseNumber(value) {
      if (value === null || value === undefined || value === "") return 0;
      const text = String(value).replace(/,/g, "").trim();
      const num = Number(text);
      return Number.isFinite(num) ? num : 0;
    }

    function isTruthyY(value) {
      return normalizeText(value).toUpperCase() === "Y";
    }

    function getSalesGroup(rawCategory) {
      const value = normalizeText(rawCategory);
      if (value === "契約" || value === "契約憑證") return "契約";
      if (value === "塔位" || value === "塔位憑證" || value === "寵物塔位") return "塔位";
      if (value === "墓園") return "墓園";
      return null;
    }

    function getCountGroup(rawCategory) {
      const value = normalizeText(rawCategory);
      if (value === "契約" || value === "塔位" || value === "墓園") return value;
      return null;
    }

    function getTitleGroup(title) {
      const value = normalizeText(title);
      if (["協理", "資深協理", "專案協理"].includes(value)) return "協理";
      if (["處長", "副處長", "經理", "主任"].includes(value)) return value;
      return value;
    }

    function isSupervisorTitle(title) {
      return ["處長", "副處長", "資深協理", "協理", "專案協理", "經理", "主任"].includes(normalizeText(title));
    }

    function formatMinguoMonth(year, month) {
      return `${year}${String(month).padStart(2, "0")}`;
    }

    function getPrevYearMonth(yyyymm) {
      const year = Number(String(yyyymm).slice(0, 3));
      const month = String(yyyymm).slice(3).padStart(2, "0");
      return `${year - 1}${month}`;
    }

    function getYtdMonths(yyyymm) {
      const year = Number(String(yyyymm).slice(0, 3));
      const month = Number(String(yyyymm).slice(3));
      return Array.from({ length: month }, (_, idx) => formatMinguoMonth(year, idx + 1));
    }

    function getPeriodLabel(yyyymm) {
      return `${String(yyyymm).slice(0, 3)} 年 ${String(yyyymm).slice(3).padStart(2, "0")} 月`;
    }

    function isOrgRowActive(row) {
      const snapshotMonth = normalizeText(row["年月"]);
      const leaveDate = normalizeText(row["離職年月日"]);
      if (!snapshotMonth) return false;
      if (!leaveDate) return true;
      return leaveDate.slice(0, 5) >= snapshotMonth;
    }

    function buildResolutionForMonth(rows) {
      const byEmployee = new Map();
      const byNode = new Map();

      for (const row of rows) {
        const employeeId = normalizeText(row["業務身份證字號"]);
        const officeName = normalizeText(row["營業處名稱"]);
        const gPosition = normalizeText(row["g_position"]);
        if (!employeeId || !officeName || !gPosition) continue;
        if (!byEmployee.has(employeeId)) byEmployee.set(employeeId, row);
        const nodeKey = `${officeName}__${gPosition}`;
        if (!byNode.has(nodeKey)) byNode.set(nodeKey, []);
        byNode.get(nodeKey).push(row);
      }

      function supervisorPriority(title) {
        return ({
          "主任": 1,
          "經理": 2,
          "專案協理": 3,
          "協理": 4,
          "資深協理": 5,
          "副處長": 6,
          "處長": 7,
        })[normalizeText(title)] ?? 99;
      }

      function chooseSupervisor(candidates) {
        return [...candidates]
          .filter((row) => isSupervisorTitle(row["職稱"]))
          .sort((a, b) => supervisorPriority(a["職稱"]) - supervisorPriority(b["職稱"]))[0] || null;
      }

      const resolved = new Map();
      for (const [employeeId, row] of byEmployee.entries()) {
        const title = normalizeText(row["職稱"]);
        if (title !== "業務代表") {
          resolved.set(employeeId, row);
          continue;
        }
        const officeName = normalizeText(row["營業處名稱"]);
        const gPosition = normalizeText(row["g_position"]);
        let owner = null;
        for (let len = gPosition.length; len >= 2; len -= 2) {
          const ancestor = gPosition.slice(0, len);
          const nodeRows = byNode.get(`${officeName}__${ancestor}`) || [];
          owner = chooseSupervisor(nodeRows.filter((candidate) => normalizeText(candidate["業務身份證字號"]) !== employeeId));
          if (owner) break;
        }
        resolved.set(employeeId, owner || row);
      }

      return { byEmployee, resolved };
    }

    function ensureResolutionCache() {
      if (state.orgResolutionCache.size) return;
      const monthGroups = new Map();
      for (const row of state.orgRows) {
        const month = normalizeText(row["年月"]);
        if (!month) continue;
        if (!monthGroups.has(month)) monthGroups.set(month, []);
        monthGroups.get(month).push(row);
      }
      for (const [month, rows] of monthGroups.entries()) {
        state.orgResolutionCache.set(month, buildResolutionForMonth(rows));
      }
    }

    function buildSheetQueryUrl({ spreadsheetId, sheetName }) {
      const url = new URL(`https://docs.google.com/spreadsheets/d/${spreadsheetId}/gviz/tq`);
      url.searchParams.set("sheet", sheetName);
      return url.toString();
    }

    function dataTableToObjects(dataTable) {
      const headers = Array.from({ length: dataTable.getNumberOfColumns() }, (_, colIndex) => {
        return dataTable.getColumnLabel(colIndex) || dataTable.getColumnId(colIndex) || `COL_${colIndex + 1}`;
      });

      return Array.from({ length: dataTable.getNumberOfRows() }, (_, rowIndex) => {
        const row = {};
        headers.forEach((header, colIndex) => {
          const formatted = dataTable.getFormattedValue(rowIndex, colIndex);
          const raw = dataTable.getValue(rowIndex, colIndex);
          row[header] = formatted ?? raw ?? "";
        });
        return row;
      });
    }

    async function fetchSheetRows(sheetConfig) {
      await googleChartsReady;
      return new Promise((resolve, reject) => {
        const query = new google.visualization.Query(buildSheetQueryUrl(sheetConfig));
        query.send((response) => {
          if (response.isError()) {
            reject(new Error(response.getMessage() || "Google Sheets 讀取失敗"));
            return;
          }
          resolve(dataTableToObjects(response.getDataTable()));
        });
      });
    }

    function setStatus(text) {
      $("statusText").textContent = text;
    }

    function getCurrentMinguoYear() {
      return String(new Date().getFullYear() - 1911);
    }

    function getAvailableMonthsForYear(year) {
      return [...new Set(
        state.salesRows
          .filter((row) => normalizeText(row["年"]) === year)
          .map((row) => String(parseNumber(row["月"])).padStart(2, "0"))
          .filter((month) => month !== "00")
      )].sort();
    }

    function updateMonthOptions(selectedYear, preferredMonth = null) {
      const months = getAvailableMonthsForYear(selectedYear);
      fillSelect($("monthSelect"), months, preferredMonth || months.at(-1));
    }

    function buildFilterOptions() {
      const years = [...new Set(state.salesRows.map((row) => normalizeText(row["年"])).filter(Boolean))].sort();
      const channels = ["全部", ...new Set(state.salesRows.map((row) => normalizeText(row["通路類別"])).filter(Boolean))];
      const defaultYear = years.includes(getCurrentMinguoYear()) ? getCurrentMinguoYear() : years.at(-1);
      const defaultChannel = channels.includes("營業處") ? "營業處" : channels[0];

      fillSelect($("yearSelect"), years, defaultYear);
      updateMonthOptions(defaultYear);
      fillSelect($("channelSelect"), channels, defaultChannel);
      fillSelect($("productSelect"), productOptions, "全部");
      fillSelect($("metricCategorySelect"), metricCategories, "產品銷售");

      ["yearSelect", "monthSelect", "channelSelect", "productSelect", "metricCategorySelect"].forEach((id) => {
        $(id).disabled = false;
      });
      renderTitlePills();
      toggleTitleCard();
    }

    function fillSelect(el, values, selectedValue) {
      el.innerHTML = values.map((value) => `<option value="${value}">${value}</option>`).join("");
      if (selectedValue && values.includes(selectedValue)) {
        el.value = selectedValue;
      }
    }

    function renderTitlePills() {
      $("titlePills").innerHTML = titleOptions.map((title) => {
        const active = state.selectedTitles.has(title) ? "active" : "";
        return `<button type="button" class="pill ${active}" data-title="${title}">${title}</button>`;
      }).join("");
      $("titlePills").querySelectorAll(".pill").forEach((pill) => {
        pill.addEventListener("click", () => {
          const title = pill.dataset.title;
          if (state.selectedTitles.has(title)) {
            if (state.selectedTitles.size === 1) return;
            state.selectedTitles.delete(title);
          } else {
            state.selectedTitles.add(title);
          }
          renderTitlePills();
          renderReport();
        });
      });
    }

    function toggleTitleCard() {
      $("titleFilterCard").classList.toggle("show", $("metricCategorySelect").value === "組織結構");
    }

    function getSelectedContext() {
      const year = $("yearSelect").value;
      const month = $("monthSelect").value;
      const yyyymm = `${year}${month}`;
      return {
        year,
        month,
        yyyymm,
        prevYyyymm: getPrevYearMonth(yyyymm),
        ytdMonths: getYtdMonths(yyyymm),
        prevYtdMonths: getYtdMonths(getPrevYearMonth(yyyymm)),
        channel: $("channelSelect").value,
        product: $("productSelect").value,
        metricCategory: $("metricCategorySelect").value,
        titles: [...state.selectedTitles],
      };
    }

    function filterSalesRowsByPeriod(yyyymm, channel) {
      return state.salesRows.filter((row) => {
        if (normalizeText(row["業績確認年月"]) !== yyyymm) return false;
        if (!isTruthyY(row["業績認列"])) return false;
        if (normalizeText(row["營業處名稱"]) === "業務開發處") return false;
        if (channel !== "全部" && normalizeText(row["通路類別"]) !== channel) return false;
        return true;
      });
    }

    function filterSalesRowsByProduct(rows, product, forCount = false) {
      return rows.filter((row) => {
        const group = forCount ? getCountGroup(row["產品類別"]) : getSalesGroup(row["產品類別"]);
        if (!group) return false;
        if (product === "全部") return true;
        return group === product;
      });
    }

    function getRevenue(rows, product) {
      return filterSalesRowsByProduct(rows, product, false).reduce((sum, row) => sum + parseNumber(row["管報金額"]), 0);
    }

    function getDealCount(rows, product) {
      return filterSalesRowsByProduct(rows, product, true).length;
    }

    function getCustomerCount(rows, product) {
      const set = new Set();
      for (const row of filterSalesRowsByProduct(rows, product, false)) {
        const customerId = normalizeText(row["客戶身份證字號"]);
        if (customerId) set.add(customerId);
      }
      return set.size;
    }

    function getBigOrderRows(rows, product, forCount = false) {
      return filterSalesRowsByProduct(rows, product, forCount).filter((row) => parseNumber(row["管報金額"]) >= 100);
    }

    function getPaymentRows(rows, product, kind) {
      return filterSalesRowsByProduct(rows, product, false).filter((row) => {
        const payment = normalizeText(row["付款方式類別"]);
        if (kind === "installment") return payment.includes("分期");
        if (kind === "cash") return payment.includes("現金");
        return false;
      });
    }

    function getSelfPurchaseRows(rows, product) {
      return filterSalesRowsByProduct(rows, product, false).filter((row) => isTruthyY(row["是否自購"]));
    }

    function getResolvedOwner(row) {
      const month = normalizeText(row["業績確認年月"]);
      const employeeId = normalizeText(row["業務身份證字號"]);
      const cache = state.orgResolutionCache.get(month);
      return cache?.resolved.get(employeeId) || null;
    }

    function getActiveOrgRows(yyyymm) {
      return state.orgRows.filter((row) => normalizeText(row["年月"]) === yyyymm && isSupervisorTitle(row["職稱"]) && isOrgRowActive(row));
    }

    function getActiveHeadcount(yyyymm, titles = null) {
      const rows = getActiveOrgRows(yyyymm).filter((row) => !titles || titles.includes(getTitleGroup(row["職稱"])));
      return new Set(rows.map((row) => normalizeText(row["業務身份證字號"]))).size;
    }

    function getProductiveHeadcount(rows, product, titles = null) {
      const ids = new Set();
      for (const row of filterSalesRowsByProduct(rows, product, false)) {
        const owner = getResolvedOwner(row);
        if (!owner) continue;
        const groupedTitle = getTitleGroup(owner["職稱"]);
        if (titles && !titles.includes(groupedTitle)) continue;
        if (!isSupervisorTitle(owner["職稱"])) continue;
        ids.add(normalizeText(owner["業務身份證字號"]));
      }
      return ids.size;
    }

    function getRevenueByTitles(rows, product, titles) {
      return filterSalesRowsByProduct(rows, product, false).reduce((sum, row) => {
        const owner = getResolvedOwner(row);
        if (!owner) return sum;
        const groupedTitle = getTitleGroup(owner["職稱"]);
        if (!titles.includes(groupedTitle)) return sum;
        return sum + parseNumber(row["管報金額"]);
      }, 0);
    }

    function getOfficeRevenueRank(rows, product, topN) {
      const officeMap = new Map();
      for (const row of filterSalesRowsByProduct(rows, product, false)) {
        if (normalizeText(row["通路類別"]) !== "營業處") continue;
        const officeName = normalizeText(row["營業處名稱"]);
        officeMap.set(officeName, (officeMap.get(officeName) || 0) + parseNumber(row["管報金額"]));
      }
      return [...officeMap.values()].sort((a, b) => b - a).slice(0, topN).reduce((sum, value) => sum + value, 0);
    }

    function subtractMonths(yyyymm, months) {
      const year = Number(String(yyyymm).slice(0, 3)) + 1911;
      const month = Number(String(yyyymm).slice(3));
      const date = new Date(year, month - 1 - months, 1);
      return `${String(date.getFullYear() - 1911).padStart(3, "0")}${String(date.getMonth() + 1).padStart(2, "0")}`;
    }

    function getRetentionRate(yyyymm, hireType, months) {
      const cohortMonth = subtractMonths(yyyymm, months);
      const cohort = state.orgRows.filter((row) => normalizeText(row["年月"]) === cohortMonth && normalizeText(row["報聘狀況"]) === hireType);
      if (!cohort.length) return null;
      const currentMonthMap = new Map(
        state.orgRows
          .filter((row) => normalizeText(row["年月"]) === yyyymm)
          .map((row) => [normalizeText(row["業務身份證字號"]), row])
      );
      let retained = 0;
      for (const row of cohort) {
        const current = currentMonthMap.get(normalizeText(row["業務身份證字號"]));
        if (current && isOrgRowActive(current)) retained += 1;
      }
      return retained / cohort.length;
    }

    function safeDivide(numerator, denominator) {
      if (!denominator) return null;
      return numerator / denominator;
    }

    function metricLabel(template, context) {
      return template
        .replace(/\{product\}/g, context.product === "全部" ? "全商品" : context.product)
        .replace(/\{titles\}/g, context.titles.join("/"));
    }

    function buildMetricRegistry(context) {
      return {
        "產品銷售": [
          {
            key: "revenue",
            label: "{product}業績",
            note: "依產品類別統計有效業績總額。",
            type: "currency",
            value: (rows) => getRevenue(rows, context.product),
          },
          {
            key: "dealCount",
            label: "{product}件數",
            note: "只算契約 / 塔位 / 墓園；不算各種憑證與寵物塔位。",
            type: "integer",
            value: (rows) => getDealCount(rows, context.product),
          },
          {
            key: "mixRatio",
            label: "{product}業績佔率",
            note: "當產品類別為全部時不顯示。",
            type: "percent",
            hidden: () => context.product === "全部",
            value: (rows) => safeDivide(getRevenue(rows, context.product), getRevenue(rows, "全部")),
          },
          {
            key: "avgUnitPrice",
            label: "{product}平均單價",
            note: "全商品平均單價 = 總業績 / 總件數。",
            type: "currency",
            value: (rows) => safeDivide(getRevenue(rows, context.product), getDealCount(rows, context.product)),
          },
          {
            key: "bigOrderRevenueRatio",
            label: "{product}大單業績佔率",
            note: "大單門檻為 100 萬；分母採同類母體。",
            type: "percent",
            value: (rows) => safeDivide(
              getBigOrderRows(rows, context.product, false).reduce((sum, row) => sum + parseNumber(row["管報金額"]), 0),
              getRevenue(rows, context.product)
            ),
          },
          {
            key: "bigOrderCountRatio",
            label: "{product}大單件數佔率",
            note: "大單門檻為 100 萬；分母採同類母體。",
            type: "percent",
            value: (rows) => safeDivide(getBigOrderRows(rows, context.product, true).length, getDealCount(rows, context.product)),
          },
        ],
        "展業效率": [
          {
            key: "revenue",
            label: "{product}業績",
            note: "依產品類別統計有效業績總額。",
            type: "currency",
            value: (rows) => getRevenue(rows, context.product),
          },
          {
            key: "activeHeadcount",
            label: "在職人數",
            note: "主任級(含)以上在職人數。",
            type: "integer",
            value: (_, period) => getActiveHeadcount(period),
          },
          {
            key: "productiveHeadcount",
            label: "實動人數",
            note: "當月有業績貢獻的主任級(含)以上人數。",
            type: "integer",
            value: (rows) => getProductiveHeadcount(rows, context.product),
          },
          {
            key: "productiveRate",
            label: "實動率",
            note: "實動人數 / 在職人數。",
            type: "percent",
            value: (rows, period) => safeDivide(getProductiveHeadcount(rows, context.product), getActiveHeadcount(period)),
          },
          {
            key: "revenuePerHead",
            label: "產值",
            note: "每位實動人員平均產出。",
            type: "currency",
            value: (rows) => safeDivide(getRevenue(rows, context.product), getProductiveHeadcount(rows, context.product)),
          },
          {
            key: "customerCount",
            label: "客戶人數",
            note: "去重後客戶人數。",
            type: "integer",
            value: (rows) => getCustomerCount(rows, context.product),
          },
          {
            key: "avgRevenuePerCustomer",
            label: "客均單價",
            note: "每位客戶平均帶來的業績。",
            type: "currency",
            value: (rows) => safeDivide(getRevenue(rows, context.product), getCustomerCount(rows, context.product)),
          },
          {
            key: "avgDealsPerCustomer",
            label: "客均件數",
            note: "每位客戶平均購買件數。",
            type: "decimal",
            value: (rows) => safeDivide(getDealCount(rows, context.product), getCustomerCount(rows, context.product)),
          },
          {
            key: "customersPerHead",
            label: "人均客數",
            note: "每位實動人員平均服務客戶數。",
            type: "decimal",
            value: (rows) => safeDivide(getCustomerCount(rows, context.product), getProductiveHeadcount(rows, context.product)),
          },
        ],
        "付款方式": [
          {
            key: "revenue",
            label: "{product}業績",
            note: "依產品類別統計有效業績總額。",
            type: "currency",
            value: (rows) => getRevenue(rows, context.product),
          },
          {
            key: "installmentRevenue",
            label: "分期件業績",
            note: "一般分期 + 現金分期。",
            type: "currency",
            value: (rows) => getPaymentRows(rows, context.product, "installment").reduce((sum, row) => sum + parseNumber(row["管報金額"]), 0),
          },
          {
            key: "installmentRatio",
            label: "分期件佔率",
            note: "分母採同類母體。",
            type: "percent",
            value: (rows) => safeDivide(
              getPaymentRows(rows, context.product, "installment").reduce((sum, row) => sum + parseNumber(row["管報金額"]), 0),
              getRevenue(rows, context.product)
            ),
          },
          {
            key: "cashRevenue",
            label: "現金件業績",
            note: "符合現金件條件的業績金額。",
            type: "currency",
            value: (rows) => getPaymentRows(rows, context.product, "cash").reduce((sum, row) => sum + parseNumber(row["管報金額"]), 0),
          },
          {
            key: "cashRatio",
            label: "現金件佔率",
            note: "分母採同類母體。",
            type: "percent",
            value: (rows) => safeDivide(
              getPaymentRows(rows, context.product, "cash").reduce((sum, row) => sum + parseNumber(row["管報金額"]), 0),
              getRevenue(rows, context.product)
            ),
          },
          {
            key: "selfPurchaseRatio",
            label: "自購件占比",
            note: "分母採同類母體。",
            type: "percent",
            value: (rows) => safeDivide(
              getSelfPurchaseRows(rows, context.product).reduce((sum, row) => sum + parseNumber(row["管報金額"]), 0),
              getRevenue(rows, context.product)
            ),
          },
        ],
        "增員育留": [
          {
            key: "revenue",
            label: "{product}業績",
            note: "依產品類別統計有效業績總額。",
            type: "currency",
            value: (rows) => getRevenue(rows, context.product),
          },
          {
            key: "newHireCount",
            label: "新進報聘人數",
            note: "當月報聘狀況 = 新進。",
            type: "integer",
            value: (_, period) => state.orgRows.filter((row) => normalizeText(row["年月"]) === period && normalizeText(row["報聘狀況"]) === "新進").length,
          },
          {
            key: "rehireCount",
            label: "重新報聘人數",
            note: "當月報聘狀況 = 重新報聘。",
            type: "integer",
            value: (_, period) => state.orgRows.filter((row) => normalizeText(row["年月"]) === period && normalizeText(row["報聘狀況"]) === "重新報聘").length,
          },
          {
            key: "totalHireCount",
            label: "合計報聘人數",
            note: "新進 + 重新報聘。",
            type: "integer",
            value: (_, period) =>
              state.orgRows.filter((row) => normalizeText(row["年月"]) === period && ["新進", "重新報聘"].includes(normalizeText(row["報聘狀況"]))).length,
          },
          {
            key: "retention6",
            label: "6個月續留率",
            note: "以 6 個月前報聘 cohort 計算。",
            type: "percent",
            value: (_, period) => {
              const newRate = getRetentionRate(period, "新進", 6);
              const rehireRate = getRetentionRate(period, "重新報聘", 6);
              if (newRate === null && rehireRate === null) return null;
              if (newRate === null) return rehireRate;
              if (rehireRate === null) return newRate;
              return (newRate + rehireRate) / 2;
            },
          },
          {
            key: "retention12",
            label: "12個月續留率",
            note: "以 12 個月前報聘 cohort 計算。",
            type: "percent",
            value: (_, period) => {
              const newRate = getRetentionRate(period, "新進", 12);
              const rehireRate = getRetentionRate(period, "重新報聘", 12);
              if (newRate === null && rehireRate === null) return null;
              if (newRate === null) return rehireRate;
              if (rehireRate === null) return newRate;
              return (newRate + rehireRate) / 2;
            },
          },
        ],
        "組織結構": [
          {
            key: "revenue",
            label: "{product}業績",
            note: "依產品類別統計有效業績總額。",
            type: "currency",
            value: (rows) => getRevenue(rows, context.product),
          },
          {
            key: "activeHeadcount",
            label: "在職人數",
            note: "主任級(含)以上在職人數。",
            type: "integer",
            value: (_, period) => getActiveHeadcount(period),
          },
          {
            key: "titleHeadcount",
            label: "{titles}人數",
            note: "依目前職級複選結果統計。",
            type: "integer",
            value: (_, period) => getActiveHeadcount(period, context.titles),
          },
          {
            key: "titleHeadcountRatio",
            label: "{titles}人數佔率",
            note: "依目前職級複選結果統計。",
            type: "percent",
            value: (_, period) => safeDivide(getActiveHeadcount(period, context.titles), getActiveHeadcount(period)),
          },
          {
            key: "titleRevenue",
            label: "{titles}業績",
            note: "依目前職級複選結果統計。",
            type: "currency",
            value: (rows) => getRevenueByTitles(rows, context.product, context.titles),
          },
          {
            key: "titleRevenueRatio",
            label: "{titles}業績佔率",
            note: "分母採同類母體。",
            type: "percent",
            value: (rows) => safeDivide(getRevenueByTitles(rows, context.product, context.titles), getRevenue(rows, context.product)),
          },
          {
            key: "top1Revenue",
            label: "營Top1業績",
            note: "通路 = 營業處時適用。",
            type: "currency",
            value: (rows) => getOfficeRevenueRank(rows, context.product, 1),
          },
          {
            key: "top1Ratio",
            label: "營Top1業績佔率",
            note: "通路 = 營業處時適用。",
            type: "percent",
            value: (rows) => safeDivide(getOfficeRevenueRank(rows, context.product, 1), getRevenue(rows, context.product)),
          },
          {
            key: "top5Revenue",
            label: "營Top5業績",
            note: "通路 = 營業處時適用。",
            type: "currency",
            value: (rows) => getOfficeRevenueRank(rows, context.product, 5),
          },
          {
            key: "top5Ratio",
            label: "營Top5業績佔率",
            note: "通路 = 營業處時適用。",
            type: "percent",
            value: (rows) => safeDivide(getOfficeRevenueRank(rows, context.product, 5), getRevenue(rows, context.product)),
          },
          {
            key: "top10Revenue",
            label: "營Top10業績",
            note: "通路 = 營業處時適用。",
            type: "currency",
            value: (rows) => getOfficeRevenueRank(rows, context.product, 10),
          },
          {
            key: "top10Ratio",
            label: "營Top10業績佔率",
            note: "通路 = 營業處時適用。",
            type: "percent",
            value: (rows) => safeDivide(getOfficeRevenueRank(rows, context.product, 10), getRevenue(rows, context.product)),
          },
        ],
      };
    }

    function formatValue(value, type) {
      if (value === null || value === undefined || Number.isNaN(value)) return "—";
      if (type === "percent") return `${(value * 100).toFixed(1)}%`;
      if (type === "integer") return `${Math.round(value).toLocaleString("zh-TW")}`;
      if (type === "decimal") return `${value.toFixed(1)}`;
      return `${Math.round(value).toLocaleString("zh-TW")}`;
    }

    function formatDelta(value, type) {
      if (value === null || value === undefined || Number.isNaN(value)) return "—";
      const formatted = formatValue(Math.abs(value), type);
      const cls = value > 0 ? "good" : value < 0 ? "bad" : "";
      const sign = value > 0 ? "+" : value < 0 ? "-" : "";
      return `<span class="num ${cls}">${sign}${formatted}</span>`;
    }

    function computePeriodMetrics(yyyymm, context) {
      const rows = filterSalesRowsByPeriod(yyyymm, context.channel);
      return { yyyymm, rows };
    }

    function computeYtdRows(months, context) {
      return months.flatMap((month) => filterSalesRowsByPeriod(month, context.channel));
    }

    function renderWarnings(context) {
      const warnings = [];
      if (["展業效率", "增員育留", "組織結構"].includes(context.metricCategory) && context.channel !== "營業處") {
        warnings.push("目前選到的人員/組織型指標，會使用業務組織檔計算。若通路不是「營業處」，部分指標可能只對營業處體系有完整覆蓋。");
      }
      if (context.metricCategory === "組織結構" && context.titles.length === 0) {
        warnings.push("組織結構類至少要保留一個職級。");
      }
      const box = $("warningBox");
      if (warnings.length) {
        box.classList.add("show");
        box.innerHTML = warnings.join("<br>");
      } else {
        box.classList.remove("show");
        box.textContent = "";
      }
    }

    function renderReport() {
      if (!state.loaded) return;
      const context = getSelectedContext();
      toggleTitleCard();
      renderWarnings(context);

      const registry = buildMetricRegistry(context)[context.metricCategory];
      const current = computePeriodMetrics(context.yyyymm, context);
      const prev = computePeriodMetrics(context.prevYyyymm, context);
      const currentYtdRows = computeYtdRows(context.ytdMonths, context);
      const prevYtdRows = computeYtdRows(context.prevYtdMonths, context);

      const rowsHtml = registry
        .filter((metric) => !(metric.hidden && metric.hidden()))
        .map((metric) => {
          const currentValue = metric.value(current.rows, context.yyyymm);
          const prevValue = metric.value(prev.rows, context.prevYyyymm);
          const currentYtdValue = metric.value(currentYtdRows, context.yyyymm);
          const prevYtdValue = metric.value(prevYtdRows, context.prevYyyymm);
          const label = metricLabel(metric.label, context);

          const monthDelta = currentValue === null || prevValue === null ? null : currentValue - prevValue;
          const monthDeltaRate = currentValue === null || prevValue === null ? null : safeDivide(currentValue - prevValue, prevValue);
          const ytdDelta = currentYtdValue === null || prevYtdValue === null ? null : currentYtdValue - prevYtdValue;
          const ytdDeltaRate = currentYtdValue === null || prevYtdValue === null ? null : safeDivide(currentYtdValue - prevYtdValue, prevYtdValue);

          return `
            <tr>
              <td class="metric-name"><span class="metric-tip" title="${metric.note}">${label}</span></td>
              <td class="num">${formatValue(currentValue, metric.type)}</td>
              <td class="num">${formatValue(prevValue, metric.type)}</td>
              <td>${formatDelta(monthDelta, metric.type)}</td>
              <td class="num">${formatValue(monthDeltaRate, "percent")}</td>
              <td class="num">${formatValue(currentYtdValue, metric.type)}</td>
              <td class="num">${formatValue(prevYtdValue, metric.type)}</td>
              <td>${formatDelta(ytdDelta, metric.type)}</td>
              <td class="num">${formatValue(ytdDeltaRate, "percent")}</td>
            </tr>
          `;
        })
        .join("");

      $("reportBody").innerHTML = rowsHtml || `<tr><td colspan="9" class="muted" style="padding:24px; text-align:left;">目前條件下沒有可顯示的指標。</td></tr>`;
      $("footnote").innerHTML = `分析期間：<code>${getPeriodLabel(context.yyyymm)}</code>　|　目前條件：<code>${context.metricCategory}</code> / <code>${context.channel}</code> / <code>${context.product === "全部" ? "全商品" : context.product}</code>`;
    }

    async function useSheetRows(salesRows, orgRows) {
      state.salesRows = salesRows;
      state.orgRows = orgRows;
      state.orgResolutionCache.clear();
      ensureResolutionCache();
      state.loaded = true;
      buildFilterOptions();
      setStatus([
        "已載入資料。",
        `業績列數：${state.salesRows.length.toLocaleString("zh-TW")}`,
        `組織列數：${state.orgRows.length.toLocaleString("zh-TW")}`,
      ].join("\n"));
      renderReport();
    }

    async function handleAutoLoad() {
      setStatus("正在讀取 Google Sheets...");
      try {
        const [salesRows, orgRows] = await Promise.all([
          fetchSheetRows(SALES_SHEET),
          fetchSheetRows(ORG_SHEET),
        ]);
        await useSheetRows(salesRows, orgRows);
      } catch (error) {
        setStatus(`Google Sheets 讀取失敗：${error.message}`);
        $("reportBody").innerHTML = `<tr><td colspan="9" class="muted" style="padding:24px; text-align:left;">無法讀取 Google Sheets。請先將兩份試算表設為可公開讀取，建議至少設為「知道連結的任何人可檢視」，若仍失敗再使用「發布到網路」。</td></tr>`;
      }
    }

    $("yearSelect").addEventListener("change", () => {
      updateMonthOptions($("yearSelect").value);
      renderReport();
    });
    ["monthSelect", "channelSelect", "productSelect", "metricCategorySelect"].forEach((id) => {
      $(id).addEventListener("change", renderReport);
      $(id).addEventListener("change", toggleTitleCard);
    });
    handleAutoLoad();
  </script>
</body>
</html>
